name: Release Module

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Version and Update URLs
        id: bump_version
        run: |
          # Read current version from module.json
          VERSION=$(jq -r .version module.json)
          
          # Split into major, minor, patch
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          # Bump patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "Bumping version from $VERSION to $NEW_VERSION"
          
          # Update module.json with new version
          jq ".version = \"$NEW_VERSION\"" module.json > tmp.json && mv tmp.json module.json
          
          # Update download and manifest URLs to point to this new release
          REPO="${{ github.repository }}"
          MANIFEST_URL="https://github.com/$REPO/releases/latest/download/module.json"
          DOWNLOAD_URL="https://github.com/$REPO/releases/download/v$NEW_VERSION/module.zip"
          
          jq ".manifest = \"$MANIFEST_URL\" | .download = \"$DOWNLOAD_URL\"" module.json > tmp.json && mv tmp.json module.json
          
          # Save new version to environment variables for later steps
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit and Push Updated module.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # [skip ci] prevents this commit from triggering another workflow run
            git commit -m "Bump version to v${{ env.NEW_VERSION }} [skip ci]"
            git push
          fi

      - name: Create Zip Archive
        run: |
          # Zip all the module files, excluding development files like .github
          zip -r module.zip module.json scripts templates styles lang

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          draft: false
          prerelease: false
          files: |
            module.json
            module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
